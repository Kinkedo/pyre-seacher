<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>送り火サーチャー Flint Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .inactive { opacity: 0.35; filter: grayscale(0.8); }
        .mode-active { border-bottom: 3px solid #f97316; color: #f97316; font-weight: bold; }
        .is-needed { color: #60a5fa !important; }
        .is-mercenary { color: #fbbf24 !important; } /* 傭兵用ゴールド */
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col font-sans">

    <header class="bg-slate-800 shadow-2xl sticky top-0 z-40 border-b border-slate-700">
        <div class="flex justify-around border-b border-slate-700">
            <button onclick="setMode('edit')" id="btn-edit" class="px-6 py-3 text-sm transition-all">編集モード</button>
            <button onclick="setMode('search')" id="btn-search" class="px-6 py-3 text-sm transition-all">サーチモード</button>
        </div>
        <div class="p-3 flex items-center gap-2 max-w-md mx-auto">
            <select id="deck-selector" onchange="changeDeck(this.value)" class="flex-grow bg-slate-900 border border-slate-600 p-2 rounded text-xs text-orange-200 outline-none"></select>
            <button onclick="addNewDeck()" class="bg-orange-600 px-3 py-2 rounded text-[10px] font-bold shadow-lg">+ 新規デッキ</button>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full">
        <div id="quick-steal-zone" class="hidden mb-6 p-3 bg-slate-800 rounded-lg border border-orange-500/50 shadow-inner">
            <div class="text-[10px] font-bold text-orange-400 mb-2 tracking-widest text-center">⚔️ 相手のクリーチャーを盗む ⚔️</div>
            <div class="flex gap-2">
                <button onclick="openStealModal()" class="flex-grow bg-slate-700 py-2 rounded text-xs font-bold hover:bg-slate-600">カード名で検索</button>
                <button onclick="openManualSteal()" class="flex-grow bg-slate-700 py-2 rounded text-xs font-bold hover:bg-slate-600">タイプ直接入力</button>
            </div>
        </div>
        <div id="deck-list" class="space-y-6 pb-24 text-sm"></div>
    </main>

    <button id="floating-add" onclick="openModal()" class="fixed bottom-6 right-6 bg-orange-600 w-14 h-14 rounded-full text-3xl shadow-lg z-30 flex items-center justify-center active:scale-90 transition-transform">＋</button>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/98 z-50 p-4 overflow-y-auto">
        <div class="max-w-md mx-auto pt-4 flex flex-col h-full">
            <div class="flex justify-between items-center mb-4">
                <h2 id="modal-title" class="font-bold text-orange-400">カード追加</h2>
                <button onclick="closeModal()" class="text-3xl">&times;</button>
            </div>
            <div id="token-toggle-zone" class="mb-4">
                <label class="flex items-center gap-2 bg-slate-800 p-2 rounded text-sm"><input type="checkbox" id="token-switch" onchange="toggleTokenFields(this.checked)"> 自作/トークンとして入力</label>
            </div>
            <div id="search-fields">
                <input id="card-input" type="text" oninput="fetchSuggestions(this.value)" placeholder="カード名を入力..." class="w-full p-4 rounded bg-slate-800 border-2 border-orange-500 outline-none mb-4">
                <div id="suggestions" class="space-y-2 pb-10"></div>
            </div>
            <div id="token-fields" class="hidden space-y-4">
                <input id="token-name" type="text" placeholder="名前" class="w-full p-4 rounded bg-slate-800 border border-slate-600 outline-none">
                <input id="token-cmc" type="number" placeholder="CMC" class="w-full p-4 rounded bg-slate-800 border border-slate-600 outline-none">
                <input id="token-type" type="text" placeholder="タイプ（スペース区切り）" class="w-full p-4 rounded bg-slate-800 border border-slate-600 outline-none">
                <button onclick="addManualCard()" class="w-full bg-orange-600 p-4 rounded font-bold">登録</button>
            </div>
        </div>
    </div>

    <script>
        let appData = JSON.parse(localStorage.getItem('pyre_v10') || '{"mode":"edit", "currentDeckIndex":0, "decks":[{"name":"メイン", "cards":[]}]}');
        let isStealing = false;

        function save() { localStorage.setItem('pyre_v10', JSON.stringify(appData)); render(); }

        function setMode(mode) {
            appData.mode = mode;
            document.getElementById('floating-add').style.display = (mode === 'edit') ? 'flex' : 'none';
            document.getElementById('quick-steal-zone').style.display = (mode === 'search') ? 'block' : 'none';
            save();
        }

        async function fetchSuggestions(query) {
            const container = document.getElementById('suggestions');
            if (query.length < 2) return;
            const res = await fetch(`https://api.scryfall.com/cards/search?q=name%3A${encodeURIComponent(query)}+lang%3Aany&order=name`);
            const data = await res.json();
            if (data.data) {
                container.innerHTML = data.data.map(card => `
                    <div onclick="addCardById('${card.id}')" class="bg-slate-800 p-3 rounded border border-slate-700 active:bg-orange-700">
                        <div class="font-bold text-sm text-white">${card.printed_name || card.name}</div>
                        <div class="text-[10px] text-slate-500">${card.type_line}</div>
                    </div>
                `).join('');
            }
        }

        async function addCardById(id) {
            const res = await fetch(`https://api.scryfall.com/cards/${id}`);
            const data = await res.json();
            let types = (data.type_line.split(" — ")[1] || "").split(" ").filter(t => t !== "");
            if (isStealing) types.push("Mercenary"); // ジャスパー効果

            appData.decks[appData.currentDeckIndex].cards.push({
                id: Date.now(),
                name: data.printed_name || data.name,
                cmc: data.cmc || 0,
                types: types,
                active: true,
                icons: { L: data.type_line.includes("Legendary"), R: false, C: false, N: false, M: isStealing }
            });
            isStealing = false;
            save();
            closeModal();
        }

        function addManualCard() {
            const name = document.getElementById('token-name').value;
            const cmc = parseInt(document.getElementById('token-cmc').value) || 0;
            const typeStr = document.getElementById('token-type').value;
            if (!name) return;
            let types = typeStr.split(" ").filter(t => t !== "");
            if (isStealing) types.push("Mercenary");

            appData.decks[appData.currentDeckIndex].cards.push({
                id: Date.now(),
                name, cmc, types, active: true,
                icons: { L: false, R: false, C: false, N: false, M: isStealing }
            });
            isStealing = false;
            save();
            closeModal();
        }

        function render() {
            document.getElementById('btn-edit').className = `px-6 py-3 text-sm ${appData.mode === 'edit' ? 'mode-active' : ''}`;
            document.getElementById('btn-search').className = `px-6 py-3 text-sm ${appData.mode === 'search' ? 'mode-active' : ''}`;
            document.getElementById('deck-selector').innerHTML = appData.decks.map((d, i) => `<option value="${i}" ${i == appData.currentDeckIndex ? 'selected' : ''}>${d.name}</option>`).join('');
            
            const list = document.getElementById('deck-list');
            list.innerHTML = "";
            const cards = appData.decks[appData.currentDeckIndex].cards.filter(c => appData.mode === 'edit' || c.active);
            const groups = {};
            cards.forEach(c => { if (!groups[c.cmc]) groups[c.cmc] = []; groups[c.cmc].push(c); });

            Object.keys(groups).sort((a, b) => a - b).forEach(cmc => {
                const head = document.createElement('div');
                head.innerHTML = `<div class="flex items-center gap-2 text-orange-500 font-bold mb-2"><span>${cmc}</span><div class="h-[1px] bg-slate-700 flex-grow mt-1"></div></div>`;
                list.appendChild(head);

                groups[cmc].forEach(card => {
                    const isM = card.icons.M;
                    const div = document.createElement('div');
                    div.className = `relative py-2 border-b border-slate-800 flex items-center justify-between ${!card.active && appData.mode === 'edit' ? 'inactive' : ''}`;
                    div.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            ${appData.mode === 'edit' ? `<input type="checkbox" ${card.active ? 'checked' : ''} onchange="toggleCardActive(${card.id})" class="w-5 h-5">` : ''}
                            <div onclick="toggleSearchResult(${card.id})">
                                <div class="font-bold text-sm ${card.icons.N && appData.mode === 'search' ? 'text-blue-400' : 'text-slate-100'}">${card.name}</div>
                                <div class="text-[9px] uppercase ${isM ? 'is-mercenary font-bold' : 'text-slate-500'}">${card.types.join(' ')}</div>
                            </div>
                        </div>
                        <div class="flex gap-1">
                            ${['L','R','C','N','M'].map(k => `
                                <button onclick="toggleIcon(${card.id}, '${k}')" class="w-6 h-6 border rounded text-[10px] ${card.icons[k] ? 'bg-orange-600 border-orange-600 text-white' : 'border-slate-700 text-slate-600'} ${appData.mode === 'search' && !card.icons[k] ? 'hidden' : ''}">${k}</button>
                            `).join('')}
                        </div>
                    `;
                    const resDiv = document.createElement('div');
                    resDiv.id = `res-${card.id}`;
                    resDiv.className = "hidden bg-black/40 p-2 text-xs text-orange-200 mt-1 rounded border-l-2 border-orange-500";
                    list.appendChild(div);
                    list.appendChild(resDiv);
                });
            });
        }

        function toggleIcon(id, key) {
            const card = appData.decks[appData.currentDeckIndex].cards.find(c => c.id === id);
            card.icons[key] = !card.icons[key];
            if (key === 'M') {
                if (card.icons.M && !card.types.includes("Mercenary")) card.types.push("Mercenary");
                else if (!card.icons.M) card.types = card.types.filter(t => t !== "Mercenary");
            }
            save();
        }

        function toggleSearchResult(id) {
            const resDiv = document.getElementById(`res-${id}`);
            if (!resDiv.classList.contains('hidden')) { resDiv.classList.add('hidden'); return; }
            const currentCards = appData.decks[appData.currentDeckIndex].cards.filter(c => c.active);
            const card = currentCards.find(c => c.id === id);
            const targets = currentCards.filter(c => {
                const cmcMatch = c.cmc === card.cmc + 1;
                return cmcMatch && (card.icons.C || c.types.some(t => card.types.includes(t)));
            });
            resDiv.innerHTML = targets.length > 0 ? `<div class="font-bold opacity-50 mb-1">SEARCHABLE:</div>` + targets.map(t => `<div class="py-0.5">・${t.name}</div>`).join('') : `<div class="italic opacity-50">候補なし</div>`;
            resDiv.classList.remove('hidden');
        }

        function openStealModal() { isStealing = true; document.getElementById('modal-title').innerText = "クリーチャーを略奪 (傭兵付与)"; openModal(); }
        function openManualSteal() { isStealing = true; document.getElementById('token-switch').checked = true; toggleTokenFields(true); openModal(); }
        function toggleTokenFields(isT) { document.getElementById('search-fields').classList.toggle('hidden', isT); document.getElementById('token-fields').classList.toggle('hidden', !isT); }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); isStealing = false; document.getElementById('modal-title').innerText = "カード追加"; document.getElementById('token-switch').checked = false; toggleTokenFields(false); }
        function addNewDeck() { const n = prompt("デッキ名？"); if (n) { appData.decks.push({name:n, cards:[]}); appData.currentDeckIndex = appData.decks.length-1; save(); } }
        function toggleCardActive(id) { const c = appData.decks[appData.currentDeckIndex].cards.find(x => x.id === id); c.active = !c.active; save(); }
        function changeDeck(i) { appData.currentDeckIndex = parseInt(i); save(); }

        render();
    </script>
</body>
</html>
