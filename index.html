<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>送り火サーチャー Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 4px solid #f97316; color: #f97316; }
        .loading { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col">

    <header class="bg-slate-800 p-4 shadow-2xl sticky top-0 z-40">
        <h1 class="text-xl font-bold text-center text-orange-500 mb-4">🔥 送り火サーチャー</h1>
        
        <div class="flex justify-around border-b border-slate-700">
            <button onclick="switchDeck('main')" id="tab-main" class="pb-2 px-4 active-tab font-bold">メイン</button>
            <button onclick="switchDeck('side')" id="tab-side" class="pb-2 px-4 text-slate-400 font-bold">サイド</button>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full">
        <div id="deck-list" class="space-y-3 pb-24">
            </div>
    </main>

    <button onclick="openModal()" class="fixed bottom-6 right-6 bg-orange-500 w-14 h-14 rounded-full text-3xl shadow-lg z-30 flex items-center justify-center active:bg-orange-600">＋</button>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/95 z-50 p-4">
        <div class="max-w-md mx-auto pt-10">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">カードを追加</h2>
                <button onclick="closeModal()" class="text-slate-400 text-2xl">&times;</button>
            </div>
            
            <div class="relative">
                <input id="card-input" type="text" oninput="fetchSuggestions(this.value)" 
                    placeholder="カード名をいれてね（ラノワール、など）" 
                    class="w-full p-4 rounded-lg bg-slate-800 border-2 border-orange-500 outline-none text-lg">
                <div id="loading-spinner" class="hidden absolute right-4 top-4 loading text-orange-500">⏳</div>
            </div>

            <div id="suggestions" class="mt-4 space-y-2 max-h-[60vh] overflow-y-auto">
                </div>
        </div>
    </div>

    <script>
        // データの初期化
        let currentDeckType = 'main';
        let decks = JSON.parse(localStorage.getItem('pyreDecks') || '{"main":[], "side":[]}');

        // デッキ切り替え
        function switchDeck(type) {
            currentDeckType = type;
            document.getElementById('tab-main').className = type === 'main' ? 'pb-2 px-4 active-tab font-bold' : 'pb-2 px-4 text-slate-400 font-bold';
            document.getElementById('tab-side').className = type === 'side' ? 'pb-2 px-4 active-tab font-bold' : 'pb-2 px-4 text-slate-400 font-bold';
            render();
        }

        // Scryfallから候補を取得
        let timer;
        function fetchSuggestions(query) {
            clearTimeout(timer);
            const container = document.getElementById('suggestions');
            const spinner = document.getElementById('loading-spinner');
            
            if (query.length < 2) { container.innerHTML = ""; return; }
            
            spinner.classList.remove('hidden');
            timer = setTimeout(async () => {
                try {
                    const res = await fetch(`https://api.scryfall.com/cards/autocomplete?q=${encodeURIComponent(query)}`);
                    const data = await res.json();
                    spinner.classList.add('hidden');
                    
                    container.innerHTML = data.data.map(name => `
                        <div onclick="addCard('${name}')" class="bg-slate-800 p-4 rounded-lg border border-slate-700 active:bg-orange-600 active:border-orange-400 transition-colors">
                            ${name}
                        </div>
                    `).join('');
                } catch (e) {
                    spinner.classList.add('hidden');
                }
            }, 500);
        }

        // カードをデッキに追加
        async function addCard(name) {
            const spinner = document.getElementById('loading-spinner');
            spinner.classList.remove('hidden');
            
            try {
                const res = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}`);
                const data = await res.json();
                
                const card = {
                    id: Date.now(),
                    name: data.printed_name || data.name,
                    cmc: data.cmc,
                    types: (data.type_line.split(" — ")[1] || "").split(" "),
                    image: data.image_uris?.small || ""
                };

                decks[currentDeckType].push(card);
                save();
                closeModal();
            } catch (e) {
                alert("追加に失敗しました。");
            } finally {
                spinner.classList.add('hidden');
            }
        }

        function save() {
            localStorage.setItem('pyreDecks', JSON.stringify(decks));
            render();
        }

        function render() {
            const list = document.getElementById('deck-list');
            list.innerHTML = "";
            
            const currentList = decks[currentDeckType].sort((a, b) => a.cmc - b.cmc);

            if (currentList.length === 0) {
                list.innerHTML = `<div class="text-center text-slate-500 mt-20">右下の「＋」からカードを登録してね！</div>`;
                return;
            }

            currentList.forEach(card => {
                const div = document.createElement('div');
                div.className = "bg-slate-800 border-l-4 border-orange-500 rounded-lg shadow-lg overflow-hidden mb-3";
                div.innerHTML = `
                    <div class="p-4 flex justify-between items-center" onclick="toggleSearch(${card.id})">
                        <div class="flex items-center gap-3">
                            <span class="bg-orange-900 text-orange-300 font-mono px-2 py-1 rounded text-sm">${card.cmc}</span>
                            <div>
                                <div class="font-bold text-lg leading-tight">${card.name}</div>
                                <div class="text-xs text-slate-500">${card.types.join(' ')}</div>
                            </div>
                        </div>
                        <button onclick="event.stopPropagation(); removeCard(${card.id})" class="text-slate-600 p-2">&times;</button>
                    </div>
                    <div id="res-${card.id}" class="hidden bg-slate-900/50 p-4 border-t border-slate-700">
                    </div>
                `;
                list.appendChild(div);
            });
        }

        function toggleSearch(id) {
            const resDiv = document.getElementById(`res-${id}`);
            if (!resDiv.classList.contains('hidden')) {
                resDiv.classList.add('hidden');
                return;
            }

            const card = decks[currentDeckType].find(c => c.id === id);
            // 条件：同じデッキ内で CMC+1 かつ クリーチャー・タイプが一致
            const targets = decks[currentDeckType].filter(c => 
                c.cmc === card.cmc + 1 && 
                c.types.some(t => card.types.includes(t) && t !== "")
            );

            if (targets.length > 0) {
                resDiv.innerHTML = `<div class="text-orange-400 font-bold text-sm mb-2">🔥 送り先（CMC ${card.cmc + 1}）:</div>` +
                    targets.map(t => `<div class="py-1">・${t.name}</div>`).join('');
            } else {
                resDiv.innerHTML = `<div class="text-slate-500 text-sm italic">デッキ内に該当するカードがありません</div>`;
            }
            resDiv.classList.remove('hidden');
        }

        function removeCard(id) {
            if(confirm('このカードを削除しますか？')) {
                decks[currentDeckType] = decks[currentDeckType].filter(c => c.id !== id);
                save();
            }
        }

        function openModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('card-input').focus();
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('card-input').value = "";
            document.getElementById('suggestions').innerHTML = "";
        }

        render();
    </script>
</body>
</html>
