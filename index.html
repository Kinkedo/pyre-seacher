<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>送り火サーチャー Final-Navigator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .inactive { opacity: 0.35; filter: grayscale(0.8); }
        .mode-active { border-bottom: 3px solid #f97316; color: #f97316; font-weight: bold; }
        .is-mercenary { color: #fbbf24 !important; font-weight: bold; }
        .sticky-cmc { position: sticky; top: 136px; background-color: #0f172a; z-index: 20; }
        .route-node { border-left: 2px solid #475569; margin-left: 8px; padding-left: 12px; }
        html { scroll-behavior: smooth; }
        .jump-target { animation: highlight 2s ease-out; }
        @keyframes highlight { 0% { background-color: rgba(249, 115, 22, 0.4); } 100% { background-color: transparent; } }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen flex flex-col font-sans text-xs">

    <header class="bg-slate-800 shadow-2xl sticky top-0 z-40 border-b border-slate-700">
        <div class="flex justify-around border-b border-slate-700">
            <button onclick="setMode('edit')" id="btn-edit" class="px-6 py-3 text-sm">編集モード</button>
            <button onclick="setMode('search')" id="btn-search" class="px-6 py-3 text-sm">サーチモード</button>
        </div>
        <div class="p-3 flex flex-col gap-2 max-w-md mx-auto">
            <div class="flex flex-wrap gap-2 items-center">
                <select id="deck-selector" onchange="changeDeck(this.value)" class="flex-grow bg-slate-900 border border-slate-600 p-2 rounded text-orange-200 outline-none"></select>
                <div id="edit-tools" class="flex gap-2">
                    <button onclick="addNewDeck()" class="bg-slate-700 px-2 py-2 rounded font-bold">+新規</button>
                    <button onclick="openImportModal()" class="bg-slate-700 px-2 py-2 rounded font-bold">一括</button>
                    <button onclick="syncOracle()" class="bg-slate-700 px-2 py-2 rounded font-bold border border-blue-500 text-blue-300">更新</button>
                    <button id="toggle-visibility" onclick="toggleOffCards()" class="bg-slate-700 px-2 py-2 rounded font-bold border border-slate-500">OFF非表示</button>
                </div>
                <div id="search-tools" class="hidden flex gap-2">
                    <button id="btn-route-toggle" onclick="toggleRouteMode()" class="bg-slate-700 px-3 py-2 rounded font-bold border border-orange-500 text-orange-400">ルート:ON</button>
                </div>
                <span id="sync-status" class="hidden text-[9px] font-mono ml-2"></span>
            </div>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full">
        <div id="quick-steal-zone" class="hidden mb-6 p-3 bg-slate-800 rounded-lg border border-orange-500/50 shadow-lg text-center">
            <div class="text-[10px] font-bold text-orange-400 mb-2 tracking-widest uppercase italic">⚔️ STEAL SEARCH ⚔️</div>
            <div class="flex gap-2"><button onclick="openStealModal()" class="flex-grow bg-slate-700 py-2 rounded">SEARCH</button><button onclick="openManualSteal()" class="flex-grow bg-slate-700 py-2 rounded">MANUAL</button></div>
        </div>
        <div id="deck-list" class="space-y-1 pb-24"></div>
        <div id="export-zone" class="mt-10 p-4 bg-slate-800 rounded border border-slate-700 hidden">
            <textarea id="export-area" readonly class="w-full h-32 bg-slate-900 text-[10px] p-2 rounded border border-slate-700 outline-none mb-2 font-mono text-white"></textarea>
            <button onclick="copyExportText()" class="w-full bg-orange-600 py-2 rounded text-xs font-bold">BACKUP COPY</button>
        </div>
    </main>

    <button id="floating-add" onclick="openModal()" class="fixed bottom-6 right-6 bg-orange-600 w-14 h-14 rounded-full text-3xl shadow-lg z-30 flex items-center justify-center">＋</button>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/98 z-50 p-4 overflow-y-auto">
        <div class="max-w-md mx-auto pt-4 flex flex-col h-full">
            <div class="flex justify-between items-center mb-4"><h2 id="modal-title" class="font-bold text-orange-400 text-lg uppercase">Add Card</h2><button onclick="closeModal()" class="text-3xl text-slate-500">&times;</button></div>
            <div class="flex flex-col gap-2 mb-4 bg-slate-800 p-3 rounded border border-slate-700">
                <label class="flex items-center gap-2 text-xs"><input type="checkbox" id="token-switch" onchange="toggleTokenFields(this.checked)"> DIRECT INPUT</label>
                <label id="mercenary-opt" class="flex items-center gap-2 text-xs text-yellow-500 hidden"><input type="checkbox" id="mercenary-check"> SET MERCENARY</label>
            </div>
            <div id="search-fields">
                <input id="card-input" type="text" oninput="fetchSuggestions(this.value)" placeholder="Card Name..." class="w-full p-4 rounded bg-slate-800 border-2 border-orange-500 outline-none mb-4 text-white">
                <div id="suggestions" class="space-y-2 pb-10"></div>
            </div>
            <div id="token-fields" class="hidden space-y-4">
                <input id="token-name" type="text" placeholder="Name" class="w-full p-4 rounded bg-slate-800 border border-slate-600 outline-none text-white">
                <input id="token-cmc" type="number" placeholder="CMC" class="w-full p-4 rounded bg-slate-800 border border-slate-600 outline-none text-white">
                <input id="token-type" type="text" placeholder="Types (space separated)" class="w-full p-4 rounded bg-slate-800 border border-slate-600 outline-none text-white">
                <button onclick="addManualCard()" class="w-full bg-orange-600 p-4 rounded font-bold text-white uppercase tracking-widest">Done</button>
            </div>
        </div>
    </div>

    <div id="import-modal" class="hidden fixed inset-0 bg-slate-900/98 z-50 p-4">
        <div class="max-w-md mx-auto pt-4 flex flex-col h-full text-center">
            <div class="flex justify-between items-center mb-4 text-orange-400 font-bold uppercase tracking-widest"><h2>Bulk Import</h2><button onclick="closeImportModal()" class="text-3xl">&times;</button></div>
            <textarea id="import-area" placeholder="1 [x] {L,N} Card Name" class="w-full h-64 p-4 rounded bg-slate-800 border border-slate-600 outline-none mb-4 text-white font-mono text-xs"></textarea>
            <button onclick="processImport()" class="bg-orange-600 p-4 rounded font-bold text-white tracking-widest uppercase">Start Import</button>
            <p id="import-status" class="mt-4 text-[10px] text-orange-300"></p>
        </div>
    </div>

    <script>
        let appData = JSON.parse(localStorage.getItem('pyre_v17') || '{"mode":"edit", "hideOff":false, "showRoute":true, "currentDeckIndex":0, "decks":[{"name":"Main Deck", "cards":[]}]}');
        let isStealing = false;

        function save() { localStorage.setItem('pyre_v17', JSON.stringify(appData)); render(); }
        function setMode(mode) { appData.mode = mode; save(); }
        function toggleOffCards() { appData.hideOff = !appData.hideOff; save(); }
        function toggleRouteMode() { appData.showRoute = !appData.showRoute; save(); }

        // ジャンプ機能
        function jumpToCard(cardId) {
            const el = document.getElementById(`card-row-${cardId}`);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('jump-target');
                setTimeout(() => el.classList.remove('jump-target'), 2000);
            }
        }

        // ルート・候補検索
        function findRoutes(currentCard, deckCards, depth = 0) {
            const nextCMC = currentCard.cmc + 1;
            const targets = deckCards.filter(c => c.cmc === nextCMC && (currentCard.icons?.C || c.types.some(t => currentCard.types.includes(t))));
            
            if (targets.length === 0) return "";
            
            // ルート表示OFFの場合は直上のみ。ONの場合は再帰。
            return `<div class="route-node">` + targets.map(t => {
                const sub = (appData.showRoute && depth < 5) ? findRoutes(t, deckCards, depth + 1) : "";
                return `<div class="py-1 flex items-center gap-1">
                    <span class="text-orange-400 font-bold">→</span> 
                    <span onclick="jumpToCard(${t.id})" class="underline decoration-slate-600 underline-offset-2 active:text-orange-300">${t.name}</span>
                </div>${sub}`;
            }).join('') + `</div>`;
        }

        function toggleSearchResult(id) {
            const resDiv = document.getElementById(`res-${id}`);
            if (!resDiv.classList.contains('hidden')) { resDiv.classList.add('hidden'); return; }
            const currentCards = appData.decks[appData.currentDeckIndex].cards.filter(c => c.active);
            const card = currentCards.find(c => c.id === id);
            const routesHTML = findRoutes(card, currentCards);
            resDiv.innerHTML = routesHTML ? `<div class="text-[9px] font-bold opacity-30 mb-1 uppercase">${appData.showRoute ? 'Chain' : 'Direct'} Targets</div>${routesHTML}` : `<div class="italic opacity-40 text-[9px]">NO TARGETS</div>`;
            resDiv.classList.remove('hidden');
        }

        function render() {
            const isEdit = appData.mode === 'edit';
            document.getElementById('btn-edit').className = `px-6 py-3 text-sm ${isEdit ? 'mode-active' : ''}`;
            document.getElementById('btn-search').className = `px-6 py-3 text-sm ${!isEdit ? 'mode-active' : ''}`;
            document.getElementById('edit-tools').classList.toggle('hidden', !isEdit);
            document.getElementById('search-tools').classList.toggle('hidden', isEdit);
            document.getElementById('floating-add').style.display = isEdit ? 'flex' : 'none';
            document.getElementById('quick-steal-zone').style.display = isEdit ? 'none' : 'block';
            document.getElementById('export-zone').style.display = isEdit ? 'block' : 'none';
            document.getElementById('btn-route-toggle').innerText = appData.showRoute ? "ルート:ON" : "ルート:OFF";
            document.getElementById('btn-route-toggle').className = appData.showRoute ? "bg-orange-900/40 px-3 py-2 rounded font-bold border border-orange-500 text-orange-400" : "bg-slate-700 px-3 py-2 rounded font-bold border border-slate-500 text-slate-400";
            document.getElementById('toggle-visibility').innerText = appData.hideOff ? "OFF表示" : "OFF非表示";
            document.getElementById('deck-selector').innerHTML = appData.decks.map((d, i) => `<option value="${i}" ${i == appData.currentDeckIndex ? 'selected' : ''}>${d.name}</option>`).join('');
            
            const list = document.getElementById('deck-list');
            list.innerHTML = "";
            const currentDeck = appData.decks[appData.currentDeckIndex];
            const cards = currentDeck.cards.filter(c => isEdit ? (appData.hideOff ? c.active : true) : c.active);
            const groups = {};
            cards.forEach(c => { if (!groups[c.cmc]) groups[c.cmc] = []; groups[c.cmc].push(c); });

            document.getElementById('export-area').value = currentDeck.cards.map(c => `1 [${c.active ? 'x' : ' '}] {${Object.keys(c.icons).filter(k=>c.icons[k]).join(',')}} ${c.name}`).join('\n');

            Object.keys(groups).sort((a, b) => a - b).forEach(cmc => {
                const head = document.createElement('div');
                head.className = "sticky-cmc py-2";
                head.innerHTML = `<div class="flex items-center gap-2 text-orange-500 font-bold"><span class="bg-slate-900 pr-2">${cmc}</span><div class="h-[1px] bg-orange-900/20 flex-grow"></div></div>`;
                list.appendChild(head);

                groups[cmc].forEach(card => {
                    const rowWrap = document.createElement('div');
                    rowWrap.id = `card-row-${card.id}`;
                    rowWrap.className = `relative py-3 border-b border-slate-800 flex items-center justify-between transition-colors ${!card.active && isEdit ? 'inactive' : ''}`;
                    rowWrap.innerHTML = `
                        <div class="flex items-center gap-3 flex-grow overflow-hidden">
                            ${isEdit ? `<input type="checkbox" ${card.active ? 'checked' : ''} onchange="toggleCardActive(${card.id})" class="w-5 h-5 accent-orange-500">` : ''}
                            <div onclick="toggleSearchResult(${card.id})" class="flex-grow">
                                <div class="font-bold text-sm ${card.icons.N && !isEdit ? 'text-blue-400' : 'text-slate-100'}">${card.name}</div>
                                <div class="text-[9px] uppercase ${card.icons.M && !isEdit ? 'is-mercenary' : 'text-slate-500'}">${card.types.join(' ')}</div>
                            </div>
                        </div>
                        <div class="flex gap-1 items-center">
                            ${['L','R','C','N','M'].map(k => (isEdit && k === 'M') ? '' : `<button onclick="toggleIcon(${card.id}, '${k}')" class="w-6 h-6 border rounded text-[10px] ${card.icons[k] ? 'bg-orange-600 border-orange-600 text-white' : 'border-slate-700 text-slate-600'} ${!isEdit && !card.icons[k] ? 'hidden' : ''}">${k}</button>`).join('')}
                            ${isEdit ? `<button onclick="removeCard(${card.id})" class="ml-2 text-red-500 text-2xl w-8 h-8 flex items-center bg-slate-800 rounded">&times;</button>` : ''}
                        </div>
                    `;
                    const resDiv = document.createElement('div');
                    resDiv.id = `res-${card.id}`;
                    resDiv.className = "hidden bg-black/40 p-3 text-slate-300 mt-1 rounded border-l-2 border-orange-500 ml-2";
                    list.appendChild(rowWrap); list.appendChild(resDiv);
                });
            });
        }

        // オラクル同期
        async function syncOracle() {
            const currentDeck = appData.decks[appData.currentDeckIndex];
            if (!currentDeck.cards.length || !confirm('全カードのタイプとCMCをScryfallから再取得します。')) return;
            const status = document.getElementById('sync-status');
            status.classList.remove('hidden');
            for (let i = 0; i < currentDeck.cards.length; i++) {
                const card = currentDeck.cards[i];
                status.innerText = `${i + 1}/${currentDeck.cards.length}`;
                try {
                    const res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(card.name)}`);
                    const d = await res.json();
                    if (d.type_line) {
                        card.cmc = d.cmc || 0;
                        card.types = (d.type_line.split(" — ")[1] || "").split(" ").filter(t => t !== "");
                        if (card.icons.M && !card.types.includes("Mercenary")) card.types.push("Mercenary");
                    }
                } catch (e) {}
                await new Promise(r => setTimeout(r, 100));
            }
            status.innerText = "DONE!";
            save(); setTimeout(() => status.classList.add('hidden'), 2000);
        }

        async function processImport() {
            const lines = document.getElementById('import-area').value.split('\n').filter(l => l.trim() !== "");
            const status = document.getElementById('import-status');
            for (let line of lines) {
                const isActive = line.includes("[x]");
                const iconsStr = (line.match(/\{(.*?)\}/) || ["",""])[1];
                const name = line.replace(/^\d+\s+/, "").replace(/\[[x\s]\]\s+/, "").replace(/\{.*\}\s+/, "").trim();
                status.innerText = `FETCHING: ${name}`;
                try {
                    const res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(name)}`);
                    const d = await res.json();
                    if (d.type_line && d.type_line.includes("Creature")) {
                        const icons = { L: false, R: false, C: false, N: false, M: false };
                        iconsStr.split(',').forEach(k => { if(k.trim()) icons[k.trim()] = true; });
                        appData.decks[appData.currentDeckIndex].cards.push({ id: Date.now() + Math.random(), name: d.printed_name || d.name, cmc: d.cmc || 0, types: (d.type_line.split(" — ")[1] || "").split(" ").filter(t => t !== ""), active: isActive, icons });
                    }
                } catch (e) {}
                await new Promise(r => setTimeout(r, 100));
            }
            save(); closeImportModal();
        }

        function removeCard(id) { if(confirm('削除？')) { appData.decks[appData.currentDeckIndex].cards = appData.decks[appData.currentDeckIndex].cards.filter(c => c.id !== id); save(); } }
        function toggleIcon(id, k) { 
            const c = appData.decks[appData.currentDeckIndex].cards.find(x => x.id === id); 
            c.icons[k] = !c.icons[k]; 
            if (k === 'M') { if(c.icons.M) { if(!c.types.includes("Mercenary")) c.types.push("Mercenary"); } else { c.types = c.types.filter(t => t !== "Mercenary"); } }
            save(); 
        }
        async function fetchSuggestions(q) { if(q.length<2) return; const r = await fetch(`https://api.scryfall.com/cards/search?q=name%3A${encodeURIComponent(q)}+lang%3Aany&order=name`); const d = await r.json(); if(d.data) document.getElementById('suggestions').innerHTML = d.data.map(c => `<div onclick="handleCardSelection('${c.id}')" class="bg-slate-800 p-3 rounded border border-slate-700 active:bg-orange-700"><div class="font-bold text-sm text-white">${c.printed_name||c.name}</div><div class="text-[10px] text-slate-500">${c.type_line}</div></div>`).join(''); }
        function handleCardSelection(id) {
            fetch(`https://api.scryfall.com/cards/${id}`).then(r => r.json()).then(data => {
                const shouldBeMerc = document.getElementById('mercenary-check').checked;
                let types = (data.type_line.split(" — ")[1] || "").split(" ").filter(t => t !== "");
                if (shouldBeMerc) types.push("Mercenary");
                if (isStealing) {
                    const route = findRoutes({name: data.name, cmc: data.cmc, types: types, icons: {C: false}}, appData.decks[appData.currentDeckIndex].cards.filter(c=>c.active));
                    alert(`【${data.name}】(${data.cmc}) からのルートをメイン画面で展開できるようになりました。`);
                    closeModal();
                } else {
                    appData.decks[appData.currentDeckIndex].cards.push({ id: Date.now(), name: data.printed_name||data.name, cmc: data.cmc||0, types, active: true, icons: { L: data.type_line.includes("Legendary"), R: false, C: false, N: false, M: false } });
                    closeModal(); save();
                }
            });
        }
        function addManualCard() {
            const name = document.getElementById('token-name').value;
            const cmc = parseInt(document.getElementById('token-cmc').value) || 0;
            const typeStr = document.getElementById('token-type').value;
            const shouldBeMerc = document.getElementById('mercenary-check').checked;
            if (!name) return;
            let types = typeStr.split(" ").filter(t => t !== "");
            if (shouldBeMerc) types.push("Mercenary");
            appData.decks[appData.currentDeckIndex].cards.push({ id: Date.now(), name, cmc, types, active: true, icons: { L: false, R: false, C: false, N: false, M: false } }); closeModal(); save();
        }
        function copyExportText() { const a = document.getElementById('export-area'); a.select(); document.execCommand('copy'); alert("COPY DONE!"); }
        function openStealModal() { isStealing = true; document.getElementById('mercenary-opt').classList.remove('hidden'); openModal(); }
        function openManualSteal() { isStealing = true; document.getElementById('token-switch').checked = true; toggleTokenFields(true); document.getElementById('mercenary-opt').classList.remove('hidden'); openModal(); }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('mercenary-opt').classList.add('hidden'); isStealing = false; toggleTokenFields(false); }
        function openImportModal() { document.getElementById('import-modal').classList.remove('hidden'); }
        function closeImportModal() { document.getElementById('import-modal').classList.add('hidden'); }
        function toggleTokenFields(isT) { document.getElementById('search-fields').classList.toggle('hidden', isT); document.getElementById('token-fields').classList.toggle('hidden', !isT); }
        function addNewDeck() { const n = prompt("Deck Name?"); if (n) { appData.decks.push({name:n, cards:[]}); appData.currentDeckIndex = appData.decks.length-1; save(); } }
        function toggleCardActive(id) { const c = appData.decks[appData.currentDeckIndex].cards.find(x => x.id === id); c.active = !c.active; save(); }
        function changeDeck(i) { appData.currentDeckIndex = parseInt(i); save(); }

        render();
    </script>
</body>
</html>
