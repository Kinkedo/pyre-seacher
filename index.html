<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>送り火サーチャー Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .inactive { opacity: 0.35; filter: grayscale(0.8); }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col font-sans">

    <header class="bg-slate-800 p-4 shadow-2xl sticky top-0 z-40 border-b border-orange-600 text-center">
        <h1 class="text-lg font-bold text-orange-500 mb-2">🔥 送り火サーチャー</h1>
        <div class="flex gap-2 max-w-md mx-auto">
            <select id="deck-selector" onchange="changeDeck(this.value)" class="flex-grow bg-slate-900 border border-slate-600 p-2 rounded text-sm text-orange-200 outline-none"></select>
            <button onclick="addNewDeck()" class="bg-slate-700 px-3 rounded-lg text-xs">+ 新規</button>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full">
        <div id="deck-list" class="space-y-3 pb-24"></div>
    </main>

    <button onclick="openModal()" class="fixed bottom-6 right-6 bg-orange-600 w-14 h-14 rounded-full text-3xl shadow-lg z-30 flex items-center justify-center">＋</button>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/98 z-50 p-4">
        <div class="max-w-md mx-auto pt-4 flex flex-col h-full">
            <div class="flex justify-between items-center mb-4 text-orange-400 font-bold">
                <h2>カード追加（英名で検索）</h2>
                <button onclick="closeModal()" class="text-3xl">&times;</button>
            </div>
            <div class="relative">
                <input id="card-input" type="text" oninput="fetchSuggestions(this.value)" placeholder="例: llanowar" class="w-full p-4 rounded-lg bg-slate-800 border-2 border-orange-500 outline-none mb-4">
                <div id="loading-spinner" class="hidden absolute right-4 top-4 loading text-orange-500">🔥</div>
            </div>
            <div id="suggestions" class="flex-grow overflow-y-auto space-y-2 pb-10"></div>
        </div>
    </div>

    <script>
        // バージョンを上げて新しい保存場所（pyre_v7）を使います
        let appData = JSON.parse(localStorage.getItem('pyre_v7') || '{"currentDeckIndex":0, "decks":[{"name":"メインデッキ", "cards":[]}]}');

        let timer;
        function fetchSuggestions(query) {
            const container = document.getElementById('suggestions');
            const spinner = document.getElementById('loading-spinner');
            if (query.length < 2) { container.innerHTML = ""; return; }
            
            spinner.classList.remove('hidden');
            clearTimeout(timer);
            timer = setTimeout(async () => {
                try {
                    // 日本語版が存在するクリーチャーのみを検索して候補に出す
                    const res = await fetch(`https://api.scryfall.com/cards/search?q=name%3A${encodeURIComponent(query)}+type%3Acreature+lang%3Aany&order=name`);
                    const data = await res.json();
                    spinner.classList.add('hidden');
                    
                    if (data.data) {
                        container.innerHTML = data.data.map(card => `
                            <div onclick="addCardById('${card.id}')" class="bg-slate-800 p-4 rounded-lg border border-slate-700 active:bg-orange-700">
                                <div class="font-bold text-white">${card.printed_name || card.name}</div>
                                <div class="text-[10px] text-slate-500">${card.name} / CMC:${card.cmc}</div>
                            </div>
                        `).join('');
                    }
                } catch (e) { spinner.classList.add('hidden'); }
            }, 500);
        }

        // ここがエラー回避のポイント：IDで直接、確実にデータを取る
        async function addCardById(id) {
            const spinner = document.getElementById('loading-spinner');
            spinner.classList.remove('hidden');
            try {
                const res = await fetch(`https://api.scryfall.com/cards/${id}`);
                const data = await res.json();
                
                // そのカードの日本語版データをピンポイントで探しに行く
                let jpName = data.printed_name || data.name;
                
                // 日本語版が別で存在する場合の保険
                if (data.lang !== 'ja') {
                    const jpRes = await fetch(`https://api.scryfall.com/cards/search?q=oracleid%3A${data.oracle_id}+lang%3Aja`);
                    const jpData = await jpRes.json();
                    if (jpData.data && jpData.data.length > 0) {
                        jpName = jpData.data[0].printed_name || jpData.data[0].name;
                    }
                }

                const card = {
                    id: Date.now(),
                    name: jpName,
                    cmc: data.cmc,
                    types: (data.type_line.split(" — ")[1] || "").split(" ").filter(t => t !== ""),
                    active: true
                };
                appData.decks[appData.currentDeckIndex].cards.push(card);
                save();
                closeModal();
            } catch (e) {
                console.error(e);
                alert("登録エラーが起きました。もう一度試してください。");
            } finally {
                spinner.classList.add('hidden');
            }
        }

        function save() { localStorage.setItem('pyre_v7', JSON.stringify(appData)); render(); }

        function render() {
            const selector = document.getElementById('deck-selector');
            selector.innerHTML = appData.decks.map((d, i) => `<option value="${i}" ${i == appData.currentDeckIndex ? 'selected' : ''}>${d.name}</option>`).join('');
            const list = document.getElementById('deck-list');
            list.innerHTML = "";
            const currentDeck = appData.decks[appData.currentDeckIndex];
            [...currentDeck.cards].sort((a, b) => a.cmc - b.cmc).forEach(card => {
                const div = document.createElement('div');
                div.className = `bg-slate-800 border-l-4 ${card.active ? 'border-orange-500' : 'border-slate-600 inactive'} rounded shadow mb-3 transition-all`;
                div.innerHTML = `
                    <div class="p-3 flex items-center gap-3">
                        <input type="checkbox" ${card.active ? 'checked' : ''} onchange="toggleCardActive(${card.id})" class="w-6 h-6 accent-orange-500">
                        <div class="flex-grow overflow-hidden" onclick="toggleSearch(${card.id})">
                            <div class="flex items-center gap-1">
                                <span class="bg-slate-900 text-orange-400 font-bold px-1.5 py-0.5 rounded text-[10px] min-w-[1.5rem] text-center">${card.cmc}</span>
                                <span class="font-bold text-sm truncate text-white">${card.name}</span>
                            </div>
                        </div>
                        <button onclick="removeCard(${card.id})" class="text-slate-600 px-2 text-xl">&times;</button>
                    </div>
                    <div id="res-${card.id}" class="hidden bg-black/40 p-3 border-t border-slate-700 text-xs text-orange-100"></div>
                `;
                list.appendChild(div);
            });
        }

        function toggleCardActive(id) {
            const card = appData.decks[appData.currentDeckIndex].cards.find(c => c.id === id);
            card.active = !card.active;
            save();
        }

        function toggleSearch(id) {
            const resDiv = document.getElementById(`res-${id}`);
            if (!resDiv.classList.contains('hidden')) { resDiv.classList.add('hidden'); return; }
            const currentCards = appData.decks[appData.currentDeckIndex].cards;
            const card = currentCards.find(c => c.id === id);
            const targets = currentCards.filter(c => c.active && c.cmc === card.cmc + 1 && c.types.some(t => card.types.includes(t)));
            resDiv.innerHTML = targets.length > 0 ? `<div class="text-orange-500 font-bold mb-1 uppercase">Searchable:</div>` + targets.map(t => `<div class="py-1">・${t.name}</div>`).join('') : `<div class="text-slate-600 italic">候補なし</div>`;
            resDiv.classList.remove('hidden');
        }

        function changeDeck(index) { appData.currentDeckIndex = parseInt(index); render(); }
        function addNewDeck() { const name = prompt("デッキ名は？"); if (name) { appData.decks.push({name: name, cards: []}); appData.currentDeckIndex = appData.decks.length - 1; save(); } }
        function removeCard(id) { if(confirm('削除しますか？')) { appData.decks[appData.currentDeckIndex].cards = appData.decks[appData.currentDeckIndex].cards.filter(c => c.id !== id); save(); } }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); document.getElementById('card-input').focus(); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('card-input').value = ""; document.getElementById('suggestions').innerHTML = ""; }

        render();
    </script>
</body>
</html>
