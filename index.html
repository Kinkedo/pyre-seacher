<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>送り火サーチャー</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen pb-20">
    <header class="p-4 bg-slate-800 border-b border-orange-500 shadow-xl">
        <h1 class="text-xl font-bold text-orange-400 text-center">🔥 送り火サーチャー</h1>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <div id="deck-list" class="space-y-3 mb-10"></div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-slate-800 border-t border-slate-700 flex justify-center">
        <button onclick="showModal()" class="bg-orange-500 w-12 h-12 rounded-full text-2xl shadow-lg">＋</button>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/90 flex items-start justify-center p-4 pt-20 z-50">
        <div class="bg-slate-800 p-6 rounded-xl w-full max-w-sm border border-slate-600">
            <h2 class="text-lg font-bold mb-4">カードを追加</h2>
            
            <input id="card-input" type="text" oninput="searchCandidate(this.value)" placeholder="カード名を入力..." 
                class="w-full p-3 rounded bg-slate-700 border border-slate-500 focus:border-orange-500 outline-none">
            
            <div id="candidate-list" class="mt-2 max-h-40 overflow-y-auto bg-slate-700 rounded divide-y divide-slate-600"></div>

            <div class="mt-6 flex justify-end">
                <button onclick="hideModal()" class="text-slate-400 mr-4">閉じる</button>
            </div>
        </div>
    </div>

    <script>
        let deck = JSON.parse(localStorage.getItem('pyreDeck') || '[]');

        // 入力中、候補をScryfallから取得（オートコンプリート）
        async function searchCandidate(query) {
            const listDiv = document.getElementById('candidate-list');
            if (query.length < 2) { listDiv.innerHTML = ""; return; }

            try {
                // Scryfallの曖昧検索APIを利用
                const res = await fetch(`https://api.scryfall.com/cards/autocomplete?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                listDiv.innerHTML = data.data.map(name => 
                    `<div onclick="addCardByName('${name}')" class="p-3 active:bg-orange-600 hover:bg-slate-600 cursor-pointer text-sm">${name}</div>`
                ).join("");
            } catch (e) { console.error(e); }
        }

        // 候補から選ばれたらデッキに追加
        async function addCardByName(name) {
            const res = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(name)}`);
            const data = await res.json();
            
            // 日本語名がある場合は優先して取得
            const finalName = data.printed_name || data.name;
            const typeLine = data.type_line;
            
            // タイプ行からクリーチャー・タイプを抽出（例: "Creature — Elf Warrior"）
            const parts = typeLine.split(" — ");
            const types = parts.length > 1 ? parts[1].split(" ") : [];

            const newCard = {
                id: Date.now(),
                name: finalName,
                cmc: data.cmc,
                types: types,
                active: true
            };

            deck.push(newCard);
            saveAndRender();
            hideModal();
        }

        function saveAndRender() {
            localStorage.setItem('pyreDeck', JSON.stringify(deck));
            render();
        }

        function render() {
            const list = document.getElementById('deck-list');
            list.innerHTML = "";
            
            // CMC順に並べる
            const sorted = [...deck].sort((a, b) => a.cmc - b.cmc);

            sorted.forEach(card => {
                const div = document.createElement('div');
                div.className = "bg-slate-800 border-l-4 border-orange-500 p-4 rounded-lg shadow-md";
                div.innerHTML = `
                    <div class="flex justify-between items-center" onclick="showPossibleSearch(${card.id})">
                        <div>
                            <span class="text-xs bg-slate-700 px-2 py-0.5 rounded text-orange-300">CMC ${card.cmc}</span>
                            <div class="font-bold text-lg">${card.name}</div>
                        </div>
                        <button onclick="event.stopPropagation(); removeCard(${card.id})" class="text-slate-500 text-xs">削除</button>
                    </div>
                    <div id="results-${card.id}" class="hidden mt-3 p-3 bg-slate-900 rounded border border-slate-700 text-sm"></div>
                `;
                list.appendChild(div);
            });
        }

        function showPossibleSearch(id) {
            const card = deck.find(c => c.id === id);
            const resDiv = document.getElementById(`results-${id}`);
            
            if (!resDiv.classList.contains('hidden')) {
                resDiv.classList.add('hidden');
                return;
            }

            // サーチ条件：CMC+1 かつ タイプ共有
            const targets = deck.filter(c => 
                c.cmc === card.cmc + 1 && 
                c.types.some(t => card.types.includes(t))
            );

            if (targets.length > 0) {
                resDiv.innerHTML = `<div class="text-orange-400 mb-1 font-bold">🔥 サーチ先:</div>` + 
                    targets.map(t => `・${t.name}`).join("<br>");
            } else {
                resDiv.innerHTML = `<div class="text-slate-500">サーチ可能なカードがありません</div>`;
            }
            resDiv.classList.remove('hidden');
        }

        function removeCard(id) {
            deck = deck.filter(c => c.id !== id);
            saveAndRender();
        }

        function showModal() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('card-input').focus();
        }

        function hideModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('card-input').value = "";
            document.getElementById('candidate-list').innerHTML = "";
        }

        render();
    </script>
</body>
</html>
