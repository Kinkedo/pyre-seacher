<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>送り火サーチャー Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .inactive { opacity: 0.35; filter: grayscale(0.8); }
        .loading { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col font-sans">

    <header class="bg-slate-800 p-4 shadow-2xl sticky top-0 z-40 border-b border-orange-600">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-lg font-bold text-orange-500">🔥 送り火サーチャー</h1>
            <div class="flex gap-2">
                <button onclick="openImportModal()" class="text-[10px] bg-slate-700 px-2 py-1 rounded text-slate-300">一括登録</button>
                <button onclick="addNewDeck()" class="text-[10px] bg-slate-700 px-2 py-1 rounded text-slate-300">+ 新規</button>
            </div>
        </div>
        <select id="deck-selector" onchange="changeDeck(this.value)" class="w-full bg-slate-900 border border-slate-600 p-2 rounded text-sm text-orange-200 outline-none"></select>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full">
        <div id="deck-list" class="space-y-3 pb-24 text-sm text-center text-slate-500">
            </div>
    </main>

    <button onclick="openModal()" class="fixed bottom-6 right-6 bg-orange-600 w-14 h-14 rounded-full text-3xl shadow-lg z-30 flex items-center justify-center">＋</button>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/98 z-50 p-4">
        <div class="max-w-md mx-auto pt-4 flex flex-col h-full">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold text-orange-400">カード追加</h2>
                <button onclick="closeModal()" class="text-slate-400 text-3xl">&times;</button>
            </div>
            <input id="card-input" type="text" oninput="fetchSuggestions(this.value)" placeholder="日本語・英語どっちもOK" class="w-full p-4 rounded-lg bg-slate-800 border-2 border-orange-500 outline-none mb-4">
            <div id="suggestions" class="flex-grow overflow-y-auto space-y-2 pb-10"></div>
        </div>
    </div>

    <div id="import-modal" class="hidden fixed inset-0 bg-slate-900/98 z-50 p-4">
        <div class="max-w-md mx-auto pt-4 flex flex-col h-full">
            <div class="flex justify-between items-center mb-4 text-orange-400">
                <h2 class="text-lg font-bold">晴れる屋等からリストを貼り付け</h2>
                <button onclick="closeImportModal()" class="text-slate-400 text-3xl">&times;</button>
            </div>
            <textarea id="import-area" placeholder="1 枝分かれの道&#13;&#10;2 ラノワールのエルフ&#13;&#10;みたいに貼り付けてね" class="w-full h-64 p-4 rounded-lg bg-slate-800 border border-slate-600 outline-none mb-4 text-sm"></textarea>
            <button id="import-btn" onclick="processImport()" class="bg-orange-600 p-4 rounded-lg font-bold">一括登録を開始</button>
            <p id="import-status" class="mt-4 text-xs text-orange-300"></p>
        </div>
    </div>

    <script>
        let appData = JSON.parse(localStorage.getItem('pyre_v8') || '{"currentDeckIndex":0, "decks":[{"name":"メインデッキ", "cards":[]}]}');

        // --- 一括取り込み処理 ---
        async function processImport() {
            const text = document.getElementById('import-area').value;
            const lines = text.split('\n').filter(l => l.trim() !== "");
            const status = document.getElementById('import-status');
            const btn = document.getElementById('import-btn');
            
            btn.disabled = true;
            let count = 0;

            for (let line of lines) {
                // 数字とカード名を分ける（例: "4 ラノワールのエルフ" -> "ラノワールのエルフ"）
                let cardName = line.replace(/^\d+\s+/, "").trim();
                status.innerText = `登録中 (${count + 1}/${lines.length}): ${cardName}`;
                
                try {
                    const res = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(cardName)}`);
                    const data = await res.json();
                    
                    // 日本語版を探す
                    let finalName = data.printed_name || data.name;
                    if (data.lang !== 'ja') {
                        const jpRes = await fetch(`https://api.scryfall.com/cards/search?q=oracleid%3A${data.oracle_id}+lang%3Aja`);
                        const jpData = await jpRes.json();
                        if (jpData.data) finalName = jpData.data[0].printed_name || jpData.data[0].name;
                    }

                    appData.decks[appData.currentDeckIndex].cards.push({
                        id: Date.now() + count,
                        name: finalName,
                        cmc: data.cmc,
                        types: (data.type_line.split(" — ")[1] || "").split(" ").filter(t => t !== ""),
                        active: true
                    });
                    count++;
                } catch (e) { console.error(e); }
                // APIに負荷をかけないよう少し待機
                await new Promise(r => setTimeout(r, 100));
            }

            status.innerText = "完了しました！";
            btn.disabled = false;
            save();
            setTimeout(closeImportModal, 1000);
        }

        // --- 基本機能（前回同様） ---
        function save() { localStorage.setItem('pyre_v8', JSON.stringify(appData)); render(); }

        let timer;
        async function fetchSuggestions(query) {
            const container = document.getElementById('suggestions');
            if (query.length < 2) return;
            clearTimeout(timer);
            timer = setTimeout(async () => {
                const res = await fetch(`https://api.scryfall.com/cards/search?q=name%3A${encodeURIComponent(query)}+type%3Acreature+lang%3Aany&order=name`);
                const data = await res.json();
                if (data.data) {
                    container.innerHTML = data.data.map(card => `
                        <div onclick="addCardById('${card.id}')" class="bg-slate-800 p-4 rounded-lg border border-slate-700 active:bg-orange-700">
                            <div class="font-bold text-white">${card.printed_name || card.name}</div>
                            <div class="text-[10px] text-slate-500">${card.name}</div>
                        </div>
                    `).join('');
                }
            }, 500);
        }

        async function addCardById(id) {
            const res = await fetch(`https://api.scryfall.com/cards/${id}`);
            const data = await res.json();
            let jpName = data.printed_name || data.name;
            appData.decks[appData.currentDeckIndex].cards.push({
                id: Date.now(),
                name: jpName,
                cmc: data.cmc,
                types: (data.type_line.split(" — ")[1] || "").split(" ").filter(t => t !== ""),
                active: true
            });
            save();
            closeModal();
        }

        function render() {
            const selector = document.getElementById('deck-selector');
            selector.innerHTML = appData.decks.map((d, i) => `<option value="${i}" ${i == appData.currentDeckIndex ? 'selected' : ''}>${d.name}</option>`).join('');
            const list = document.getElementById('deck-list');
            list.innerHTML = "";
            const currentDeck = appData.decks[appData.currentDeckIndex];
            const sorted = [...currentDeck.cards].sort((a, b) => a.cmc - b.cmc);
            if(sorted.length === 0) { list.innerHTML = "カードがありません"; return; }
            sorted.forEach(card => {
                const div = document.createElement('div');
                div.className = `bg-slate-800 border-l-4 ${card.active ? 'border-orange-500' : 'border-slate-600 inactive'} rounded shadow mb-3 text-left`;
                div.innerHTML = `
                    <div class="p-3 flex items-center gap-3">
                        <input type="checkbox" ${card.active ? 'checked' : ''} onchange="toggleCardActive(${card.id})" class="w-6 h-6 accent-orange-500">
                        <div class="flex-grow" onclick="toggleSearch(${card.id})">
                            <div class="flex items-center gap-2">
                                <span class="bg-slate-900 text-orange-400 font-bold px-2 py-0.5 rounded text-xs min-w-[1.5rem] text-center">${card.cmc}</span>
                                <span class="font-bold text-sm text-white">${card.name}</span>
                            </div>
                        </div>
                        <button onclick="removeCard(${card.id})" class="text-slate-600 px-2 text-xl">&times;</button>
                    </div>
                    <div id="res-${card.id}" class="hidden bg-black/40 p-3 border-t border-slate-700 text-xs text-orange-100"></div>
                `;
                list.appendChild(div);
            });
        }

        function toggleCardActive(id) {
            const card = appData.decks[appData.currentDeckIndex].cards.find(c => c.id === id);
            card.active = !card.active;
            save();
        }

        function toggleSearch(id) {
            const resDiv = document.getElementById(`res-${id}`);
            if (!resDiv.classList.contains('hidden')) { resDiv.classList.add('hidden'); return; }
            const currentCards = appData.decks[appData.currentDeckIndex].cards;
            const card = currentCards.find(c => c.id === id);
            const targets = currentCards.filter(c => c.active && c.cmc === card.cmc + 1 && c.types.some(t => card.types.includes(t)));
            resDiv.innerHTML = targets.length > 0 ? `<div class="text-orange-500 font-bold mb-1 uppercase">Searchable:</div>` + targets.map(t => `<div class="py-1">・${t.name}</div>`).join('') : `<div class="text-slate-600 italic font-bold">候補なし</div>`;
            resDiv.classList.remove('hidden');
        }

        function changeDeck(index) { appData.currentDeckIndex = parseInt(index); render(); }
        function addNewDeck() { const name = prompt("デッキ名？"); if (name) { appData.decks.push({name: name, cards: []}); appData.currentDeckIndex = appData.decks.length - 1; save(); } }
        function removeCard(id) { if(confirm('削除？')) { appData.decks[appData.currentDeckIndex].cards = appData.decks[appData.currentDeckIndex].cards.filter(c => c.id !== id); save(); } }
        
        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function openImportModal() { document.getElementById('import-modal').classList.remove('hidden'); }
        function closeImportModal() { document.getElementById('import-modal').classList.add('hidden'); document.getElementById('import-area').value = ""; document.getElementById('import-status').innerText = ""; }

        render();
    </script>
</body>
</html>
