<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>送り火サーチャー Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .inactive { opacity: 0.35; filter: grayscale(0.8); }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col font-sans">

    <header class="bg-slate-800 p-4 shadow-2xl sticky top-0 z-40 border-b border-orange-600">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-lg font-bold text-orange-500">🔥 送り火サーチャー</h1>
            <button onclick="addNewDeck()" class="text-xs bg-slate-700 px-3 py-1.5 rounded-full">+ 新規</button>
        </div>
        <div class="flex gap-2">
            <select id="deck-selector" onchange="changeDeck(this.value)" class="flex-grow bg-slate-900 border border-slate-600 p-2 rounded text-sm text-orange-200 outline-none"></select>
            <button onclick="deleteCurrentDeck()" class="text-xs text-red-500">削除</button>
        </div>
    </header>

    <main class="flex-grow p-4 max-w-md mx-auto w-full">
        <div id="deck-list" class="space-y-3 pb-24"></div>
    </main>

    <button onclick="openModal()" class="fixed bottom-6 right-6 bg-orange-600 w-14 h-14 rounded-full text-3xl shadow-lg z-30 flex items-center justify-center">＋</button>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/98 z-50 p-4">
        <div class="max-w-md mx-auto pt-4 flex flex-col h-full">
            <div class="flex justify-between items-center mb-4 text-orange-400 font-bold">
                <h2>カード追加（英名で検索）</h2>
                <button onclick="closeModal()" class="text-3xl">&times;</button>
            </div>
            <input id="card-input" type="text" oninput="fetchSuggestions(this.value)" placeholder="英名を入力 (例: llanowar)" class="w-full p-4 rounded-lg bg-slate-800 border-2 border-orange-500 outline-none mb-4">
            <div id="suggestions" class="flex-grow overflow-y-auto space-y-2 pb-10"></div>
        </div>
    </div>

    <script>
        let appData = JSON.parse(localStorage.getItem('pyre_v6') || '{"currentDeckIndex":0, "decks":[{"name":"メインデッキ", "cards":[]}]}');

        // ★ここが修正ポイント：日本語版を強制的に探しに行く
        async function fetchSuggestions(query) {
            const container = document.getElementById('suggestions');
            if (query.length < 2) { container.innerHTML = ""; return; }
            
            clearTimeout(this.timer);
            this.timer = setTimeout(async () => {
                try {
                    // 日本語版があるかに関わらず、まずカードを特定する
                    const res = await fetch(`https://api.scryfall.com/cards/search?q=name%3A${encodeURIComponent(query)}+type%3Acreature&order=name`);
                    const data = await res.json();
                    
                    if (data.data) {
                        container.innerHTML = data.data.map(card => `
                            <div onclick="registerCard('${card.name}')" class="bg-slate-800 p-4 rounded-lg border border-slate-700 active:bg-orange-700">
                                <div class="font-bold text-white">${card.name}</div>
                                <div class="text-[10px] text-slate-400">タップして日本語名で登録</div>
                            </div>
                        `).join('');
                    }
                } catch (e) { }
            }, 500);
        }

        async function registerCard(englishName) {
            try {
                // 日本語版のカード情報を優先して取得するAPIリクエスト
                const res = await fetch(`https://api.scryfall.com/cards/named?exact=${encodeURIComponent(englishName)}&set=any`);
                const data = await res.json();
                
                // 日本語データ(ja)を個別に取得しに行く
                const langRes = await fetch(`https://api.scryfall.com/cards/search?q=name%3A"${encodeURIComponent(data.name)}"+lang%3Aja`);
                const langData = await langRes.json();
                
                // 日本語名があればそれを使う、なければ仕方ないので英名
                const finalName = (langData.data && langData.data[0].printed_name) ? langData.data[0].printed_name : data.name;

                const card = {
                    id: Date.now(),
                    name: finalName,
                    cmc: data.cmc,
                    types: (data.type_line.split(" — ")[1] || "").split(" ").filter(t => t !== ""),
                    active: true
                };
                appData.decks[appData.currentDeckIndex].cards.push(card);
                save();
                closeModal();
            } catch (e) { alert("登録エラー"); }
        }

        function save() { localStorage.setItem('pyre_v6', JSON.stringify(appData)); render(); }

        function render() {
            const selector = document.getElementById('deck-selector');
            selector.innerHTML = appData.decks.map((d, i) => `<option value="${i}" ${i == appData.currentDeckIndex ? 'selected' : ''}>${d.name}</option>`).join('');
            const list = document.getElementById('deck-list');
            list.innerHTML = "";
            const currentDeck = appData.decks[appData.currentDeckIndex];
            [...currentDeck.cards].sort((a, b) => a.cmc - b.cmc).forEach(card => {
                const div = document.createElement('div');
                div.className = `bg-slate-800 border-l-4 ${card.active ? 'border-orange-500' : 'border-slate-600 inactive'} rounded shadow mb-3`;
                div.innerHTML = `
                    <div class="p-3 flex items-center gap-3">
                        <input type="checkbox" ${card.active ? 'checked' : ''} onchange="toggleCardActive(${card.id})" class="w-6 h-6">
                        <div class="flex-grow overflow-hidden" onclick="toggleSearch(${card.id})">
                            <div class="flex items-center gap-2">
                                <span class="bg-slate-900 text-orange-400 font-bold px-2 py-0.5 rounded text-xs min-w-[2rem] text-center">${card.cmc}</span>
                                <span class="font-bold text-sm truncate text-white">${card.name}</span>
                            </div>
                        </div>
                        <button onclick="removeCard(${card.id})" class="text-slate-600 px-2 text-xl">&times;</button>
                    </div>
                    <div id="res-${card.id}" class="hidden bg-black/40 p-3 border-t border-slate-700 text-sm"></div>
                `;
                list.appendChild(div);
            });
        }

        function toggleCardActive(id) {
            const card = appData.decks[appData.currentDeckIndex].cards.find(c => c.id === id);
            card.active = !card.active;
            save();
        }

        function toggleSearch(id) {
            const resDiv = document.getElementById(`res-${id}`);
            if (!resDiv.classList.contains('hidden')) { resDiv.classList.add('hidden'); return; }
            const currentCards = appData.decks[appData.currentDeckIndex].cards;
            const card = currentCards.find(c => c.id === id);
            const targets = currentCards.filter(c => c.active && c.cmc === card.cmc + 1 && c.types.some(t => card.types.includes(t)));
            resDiv.innerHTML = targets.length > 0 ? `<div class="text-orange-500 text-[10px] font-bold mb-1 uppercase">Searchable:</div>` + targets.map(t => `<div class="py-1">・${t.name}</div>`).join('') : `<div class="text-slate-600 italic text-xs">候補なし</div>`;
            resDiv.classList.remove('hidden');
        }

        function changeDeck(index) { appData.currentDeckIndex = parseInt(index); render(); }
        function addNewDeck() { const name = prompt("デッキ名？"); if (name) { appData.decks.push({name: name, cards: []}); appData.currentDeckIndex = appData.decks.length - 1; save(); } }
        function deleteCurrentDeck() { if (appData.decks.length > 1 && confirm("削除しますか？")) { appData.decks.splice(appData.currentDeckIndex, 1); appData.currentDeckIndex = 0; save(); } }
        function removeCard(id) { if(confirm('カード削除？')) { appData.decks[appData.currentDeckIndex].cards = appData.decks[appData.currentDeckIndex].cards.filter(c => c.id !== id); save(); } }
        function openModal() { document.getElementById('modal').classList.remove('hidden'); document.getElementById('card-input').focus(); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); document.getElementById('card-input').value = ""; document.getElementById('suggestions').innerHTML = ""; }

        render();
    </script>
</body>
</html>
